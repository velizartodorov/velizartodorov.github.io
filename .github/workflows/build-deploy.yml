name: Build and Deploy

on:
  pull_request:
    branches:
      - master
    paths-ignore:
      - '**.md'
      - '!src/**.md'
  push:
    branches:
      - master
    paths-ignore:
      - '**.md'
      - '!src/**.md'
  workflow_dispatch: # Allows auto-merge-dependabot.yml to trigger a deploy after merging

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Cache node modules
        uses: actions/cache@v5
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        run: npm ci

      - name: Check for encoding corruption (mojibake)
        run: npm run check:encoding

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npx vitest run --exclude src/links.test.ts --exclude src/analytics.test.ts

      - name: Build the app
        run: npm run build
        env:
          NEXT_PUBLIC_COMMIT_SHA: ${{ github.sha }}

      - name: Upload Pages artifact
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        uses: actions/upload-pages-artifact@v5
        with:
          path: out/

  deploy:
    needs: build
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

  link-check:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Cache node modules
        uses: actions/cache@v5
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        run: npm ci

      - name: Check external links
        run: npx vitest run src/links.test.ts

      - name: Check Google Analytics measurement ID
        run: npx vitest run src/analytics.test.ts
