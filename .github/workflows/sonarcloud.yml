name: SonarCloud

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master

jobs:
  sonarcloud:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write # lets vitest-coverage-report-action post/update its PR comment
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          # SonarCloud's blame-based analysis (new-code period, ownership) needs full history.
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Cache node modules
        uses: actions/cache@v5
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm run coverage -- --exclude src/links.test.ts --exclude src/analytics.test.ts

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      # SonarCloud's own PR comment only reports coverage on new/changed lines (its "Clean as You
      # Code" model), not the overall project percentage. This posts a separate comment with the
      # overall number plus a per-file breakdown, reading the json-summary/json reports from the
      # coverage step above.
      - name: Vitest Coverage Report
        if: github.event_name == 'pull_request'
        uses: davelosert/vitest-coverage-report-action@v2
