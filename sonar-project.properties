# Replace with the values SonarCloud shows when you create the project
# (Organization Settings -> Organization key, and the project's Overview page).
sonar.organization=your-sonarcloud-org
sonar.projectKey=your-sonarcloud-org_velizartodorov.github.io

sonar.sources=src
sonar.exclusions=**/*.test.ts,**/*.test.tsx,src/setupTests.ts
sonar.tests=src
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx
sonar.javascript.lcov.reportPaths=coverage/lcov.info
