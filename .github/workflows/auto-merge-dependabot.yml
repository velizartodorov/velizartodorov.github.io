name: Auto-merge Dependabot PRs

on:
  workflow_run:
    # Fires as soon as CI finishes on a Dependabot PR, instead of waiting for a fixed daily slot
    workflows: ["Build and Deploy"]
    types: [completed]
  schedule:
    # Safety net in case a workflow_run event is ever missed
    - cron: '0 */3 * * *'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write
  pull-requests: write
  actions: write

jobs:
  auto-merge:
    # Skip workflow_run events that aren't for a Dependabot branch (e.g. regular PRs/pushes)
    if: github.event_name != 'workflow_run' || startsWith(github.event.workflow_run.head_branch, 'dependabot/')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Rebase out-of-date Dependabot PRs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Ask Dependabot to rebase, rather than pushing ourselves - a push made with this
          # workflow's GITHUB_TOKEN shows up as an untrusted "github-actions[bot]" actor, and
          # GitHub gates the resulting CI run behind a manual "Approve and run" click
          # (conclusion: action_required), which then blocks auto-merge forever. Dependabot's
          # own pushes aren't gated this way.
          echo "Checking open Dependabot PRs for rebase..."
          prs=$(gh pr list --author "app/dependabot" --state open --json number,mergeStateStatus)
          behind_prs=$(echo "$prs" | jq -r '.[] | select(.mergeStateStatus == "BEHIND" or .mergeStateStatus == "DIRTY") | .number')

          if [ -z "$behind_prs" ]; then
            echo "All open Dependabot PRs are up to date."
          else
            for pr in $behind_prs; do
              echo "  PR #$pr is out of date, asking Dependabot to rebase..."
              gh pr comment "$pr" --body "@dependabot rebase" 2>/dev/null || echo "  ⚠️ Could not request rebase for PR #$pr"
            done

            echo ""
            echo "⏳ Waiting for Dependabot to finish rebasing (up to 5 minutes)..."
            for i in $(seq 1 30); do
              sleep 10
              still_behind=$(gh pr list --author "app/dependabot" --state open --json number,mergeStateStatus --jq '[.[] | select(.mergeStateStatus == "BEHIND" or .mergeStateStatus == "DIRTY")] | length')
              if [ "$still_behind" -eq 0 ]; then
                echo "All PRs are now up to date."
                break
              fi
              echo "  ...$still_behind PR(s) still out of date, waiting."
            done
          fi

      - name: Auto-merge Dependabot PRs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Starting auto-merge process..."
          merged_count=0
          max_iterations=10  # Safety limit to prevent infinite loops

          for iteration in $(seq 1 $max_iterations); do
            echo ""
            echo "=== Iteration $iteration ==="
            echo "Fetching open Dependabot PRs..."

            # Get all open PRs created by dependabot
            prs=$(gh pr list --author "app/dependabot" --state open --json number,title)

            if [ "$prs" = "[]" ]; then
              echo "No open Dependabot PRs found."
              break
            fi

            echo "Found Dependabot PRs:"
            echo "$prs" | jq -r '.[] | "#\(.number): \(.title)"'

            # Track if we merged anything in this iteration
            merged_in_iteration=false

            # Process each PR
            echo "$prs" | jq -c '.[]' | while read -r pr; do
              pr_number=$(echo "$pr" | jq -r '.number')
              pr_title=$(echo "$pr" | jq -r '.title')

              echo ""
              echo "Processing PR #$pr_number: $pr_title"

              # Check if all status checks passed using gh pr checks
              if gh pr checks "$pr_number" > /dev/null 2>&1; then
                echo "  ✅ All checks passed, merging PR #$pr_number..."
                if gh pr merge "$pr_number" --squash --delete-branch; then
                  echo "  ✨ PR #$pr_number merged successfully!"
                  echo "true" > /tmp/merged_flag

                  # Ask Dependabot to rebase remaining out-of-date PRs, instead of rebasing them
                  # ourselves. A push made with this workflow's GITHUB_TOKEN shows up as an
                  # untrusted "github-actions[bot]" actor, and GitHub gates the resulting CI run
                  # behind a manual "Approve and run" click (conclusion: action_required) - which
                  # then blocks auto-merge forever. Dependabot's own pushes aren't gated this way.
                  echo ""
                  echo "  🔄 Requesting Dependabot rebase for remaining out-of-date PRs..."
                  remaining_prs=$(gh pr list --author "app/dependabot" --state open --json number --jq '.[].number')

                  if [ -n "$remaining_prs" ]; then
                    for remaining_pr in $remaining_prs; do
                      merge_state=$(gh pr view "$remaining_pr" --json mergeStateStatus --jq '.mergeStateStatus')
                      if [ "$merge_state" = "BEHIND" ] || [ "$merge_state" = "DIRTY" ]; then
                        echo "     PR #$remaining_pr is $merge_state, asking Dependabot to rebase..."
                        gh pr comment "$remaining_pr" --body "@dependabot rebase" 2>/dev/null || echo "     ⚠️ Could not request rebase for PR #$remaining_pr"
                      else
                        echo "     PR #$remaining_pr is up to date ($merge_state), no rebase needed."
                      fi
                    done
                  fi

                  # Break to re-fetch PRs after this merge
                  break
                else
                  echo "  ⚠️ Failed to merge PR #$pr_number"
                fi
              else
                echo "  ❌ Some checks failed or are pending, skipping PR #$pr_number"
                gh pr checks "$pr_number" || true
              fi
            done

            # Check if we merged anything
            if [ -f /tmp/merged_flag ]; then
              merged_in_iteration=true
              merged_count=$((merged_count + 1))
              rm /tmp/merged_flag
              echo ""
              echo "⏳ Waiting 10 seconds for GitHub to update..."
              sleep 10
            fi

            # If nothing was merged in this iteration, we're done
            if [ "$merged_in_iteration" = false ]; then
              echo ""
              echo "No more PRs to merge in this iteration."
              break
            fi
          done

          echo ""
          echo "========================================="
          echo "Auto-merge process completed!"
          echo "Total PRs merged: $merged_count"
          echo "========================================="

          if [ "$merged_count" -gt 0 ]; then
            echo ""
            echo "🚀 Triggering deployment for the updated master branch..."
            gh workflow run build-deploy.yml --ref master
          fi
